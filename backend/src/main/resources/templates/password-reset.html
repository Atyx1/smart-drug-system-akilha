<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Yenileme</title>
    <link rel="stylesheet" th:href="@{/v1/static/css/password-reset.css}">
</head>
<body>
<div class="container">
    <div class="form-box">
        <div class="logo">
            <img th:src="@{/v1/static/images/logo.jpeg}" alt="TrendDünyası">
        </div>

        <h1>Şifre Yenileme</h1>
        <p class="description">Lütfen yeni şifrenizi belirleyin</p>

        <form id="resetForm" onsubmit="return handleSubmit(event)">
            <input type="hidden" id="resetToken" th:value="${resetToken}">

            <div class="input-group">
                <label for="password">Yeni Şifre</label>
                <input
                        type="password"
                        id="password"
                        required
                        minlength="8"
                        placeholder="Yeni şifrenizi girin"
                >
            </div>

            <div class="requirements">
                <div class="requirement" id="length">
                    <span>En az 8 karakter</span>
                </div>
                <div class="requirement" id="uppercase">
                    <span>En az 1 büyük harf</span>
                </div>
                <div class="requirement" id="lowercase">
                    <span>En az 1 küçük harf</span>
                </div>
                <div class="requirement" id="number">
                    <span>En az 1 rakam</span>
                </div>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Şifre Tekrar</label>
                <input
                        type="password"
                        id="confirmPassword"
                        required
                        placeholder="Şifrenizi tekrar girin"
                >
                <div class="error-message" id="matchError">
                    Şifreler eşleşmiyor
                </div>
            </div>

            <button
                    type="submit"
                    id="submitButton"
                    disabled
            >
                <span class="button-text">Şifreyi Güncelle</span>
                <div class="button-loader"></div>
            </button>
        </form>
    </div>
</div>
<script th:src="@{/v1/static/js/password-reset.js}"></script>
</body>
</html>
