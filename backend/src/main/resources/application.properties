# ===============================
# = SERVER CONFIGURATION
# ===============================
server.port=8080
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-binding-errors=always
# ===============================
# = DATABASE CONFIGURATION
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/akilha?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# = JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# ===============================
# = LOGGING CONFIGURATION
# ===============================
logging.level.root=INFO
logging.level.com.akilha=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===============================
# = EMAIL CONFIGURATION
# ===============================
trend.email.from=${EMAIL_FROM}
trend.email.host=${EMAIL_HOST:smtp.gmail.com}
trend.email.port=${EMAIL_PORT:587}
trend.email.password=${EMAIL_PASSWORD}
trend.email.username=${EMAIL_USERNAME}

# ===============================
# = APPLICATION SPECIFIC
# ===============================
trend.client.host=${CLIENT_HOST:http://localhost:8080}
trend.domain.url=${DOMAIN_URL:http://localhost:8080}
trend.tokenType=JWT

# ===============================
# = THYMELEAF
# ===============================
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8


# ===============================
# = STATIC RESOURCES
# ===============================

spring.web.resources.cache.period=0

spring.mvc.static-path-pattern=/v1/static/**
spring.web.resources.static-locations=classpath:/static/



# ===============================
# = SWAGGER / OPENAPI
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true

# ===============================
# = INTERNATIONALIZATION
# ===============================
spring.messages.basename=ValidationMessages

# ===============================
# = CACHE CONFIGURATION
# ===============================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=600s

# ===============================
# = ACTUATOR
# ===============================

management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
management.endpoints.web.exposure.include=*

# ===============================
# = CORS CONFIGURATION
# ===============================

karbonayakizi.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}
karbonayakizi.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
karbonayakizi.cors.allowed-headers=Authorization,Content-Type,X-Requested-With
karbonayakizi.cors.max-age=3600

# ===============================
spring.web.resources.add-mappings=false

# Raspberry Pi Sync URL
pi.sync.url=${PI_SYNC_URL}
